<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFIS — Luxury Fragrance Intelligence System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <section class="hero">

        <small class="eyebrow">
            Luxury Fragrance Intelligence System
        </small>

        <h1>
            Find a fragrance that feels unmistakably yours.
        </h1>

        <p class="intro">
            Thoughtful recommendations.
            Honest guidance.
            No pressure.
            Just beautiful fragrances explained beautifully.
        </p>

        <div class="search-box">

            <input
                id="searchInput"
                type="text"
                placeholder="Search by fragrance, brand, notes, personality or occasion..."
            >

        </div>

    </section>

    <section id="results" class="results">

        <div class="empty-state">

            <h2>Start your discovery.</h2>

            <p>
                Begin typing and LFIS will instantly search the fragrance library.
            </p>

        </div>

    </section>

</main>

<script src="app.js"></script>

</body>
</html>
